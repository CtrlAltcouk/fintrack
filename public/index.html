<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>FinTrack</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="login-overlay" class="login-overlay" style="display:none"></div>
  <nav id="sidebar">
    <div class="logo">💰 FinTrack</div>
    <a data-page="dashboard"  class="active">📊 Dashboard</a>
    <a data-page="accounts">🏦 Accounts</a>
    <a data-page="transfers">🔁 Transfers</a>
    <a data-page="spending">💳 Daily Spending</a>
    <a data-page="bills">📅 Bills</a>
    <a data-page="income">💼 Income</a>
    <a data-page="reports">📈 Reports</a>
    <a data-page="settings">⚙️ Settings</a>
    <div style="flex:1"></div>
    <div id="user-pill" class="user-pill" style="display:none">
      <div id="user-pill-avatar" class="user-pill-avatar"></div>
      <span id="user-pill-name" class="user-pill-name"></span>
      <span class="user-pill-switch">⇄</span>
    </div>
  </nav>
  <main id="main"></main>
  <!-- Mobile: bottom nav bar -->
  <nav id="bottom-nav" aria-label="Mobile navigation">
    <button type="button" data-page="dashboard">
      <span class="bnav-icon" aria-hidden="true">📊</span>
      <span class="bnav-label">Home</span>
    </button>
    <button type="button" data-page="spending">
      <span class="bnav-icon" aria-hidden="true">💳</span>
      <span class="bnav-label">Spending</span>
    </button>
    <button type="button" data-page="bills">
      <span class="bnav-icon" aria-hidden="true">📅</span>
      <span class="bnav-label">Bills</span>
    </button>
    <button type="button" data-page="income">
      <span class="bnav-icon" aria-hidden="true">💼</span>
      <span class="bnav-label">Income</span>
    </button>
    <button type="button" id="more-btn" aria-expanded="false" aria-controls="more-sheet">
      <span class="bnav-icon" aria-hidden="true">☰</span>
      <span class="bnav-label">More</span>
    </button>
  </nav>

  <!-- Mobile: backdrop behind More sheet -->
  <div id="more-backdrop" aria-hidden="true"></div>

  <!-- Mobile: More slide-up sheet -->
  <div id="more-sheet" role="dialog" aria-label="More navigation" aria-modal="true" aria-hidden="true">
    <button type="button" id="more-sheet-close" class="sheet-close-btn" aria-label="Close More menu" style="display:none">✕</button>
    <div class="sheet-handle" aria-hidden="true"></div>
    <p class="sheet-section-label">More</p>
    <button type="button" class="sheet-nav-item" data-page="accounts">
      <span aria-hidden="true">🏦</span><span>Accounts</span>
    </button>
    <button type="button" class="sheet-nav-item" data-page="transfers">
      <span aria-hidden="true">🔁</span><span>Transfers</span>
    </button>
    <button type="button" class="sheet-nav-item" data-page="reports">
      <span aria-hidden="true">📈</span><span>Reports</span>
    </button>
    <button type="button" class="sheet-nav-item" data-page="settings">
      <span aria-hidden="true">⚙️</span><span>Settings</span>
    </button>
    <button type="button" id="sheet-user-pill" class="sheet-user-pill" style="display:none">
      <div id="sheet-pill-avatar" class="user-pill-avatar"></div>
      <span id="sheet-pill-name" class="user-pill-name"></span>
      <span class="user-pill-switch">⇄</span>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
